name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build - Trạm Kiến
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          
      - run: flutter pub get

      # Bỏ hẳn step "Create Podfile if missing" cũ đi và thay bằng step này
      # Step này sẽ ghi đè file Podfile chuẩn (hỗ trợ đường dẫn động) vào thư mục ios/
      - name: Generate correct Podfile
        run: |
          cat << 'EOF' > ios/Podfile
          platform :ios, '16.0'

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "The Generated.xcconfig file does not exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          install! 'cocoapods', :deterministic_uuids => false

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['DEBUG_INFORMATION_FORMAT'] = 'dwarf'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
              end
            end
          end
          EOF

      # Tắt update repo của CocoaPods để build nhanh hơn, tránh lỗi timeout CDN
      - name: Build iOS App
        env:
          COCOAPODS_DISABLE_STATS: true
        run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 TramKien.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/TramKien.ipa
          tag: v1.0.2
          overwrite: true
          body: "New update for ios"