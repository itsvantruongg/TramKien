name: Tram_Kien
description: Cổng thông tin sinh viên HAU
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.1.0
  material_symbols_icons: ^4.2719.1

  # HTTP & parsing
  http: ^1.1.0
  beautiful_soup_dart: ^0.3.0
  html: ^0.15.4

  # Local storage
  sqflite: ^2.4.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  android_intent_plus: ^5.0.0

  # State management
  provider: ^6.1.1

  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  mailer: ^6.1.0
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/qrcode_itsvantruongg.github.io.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo3.png" # Đường dẫn tới bức ảnh bạn vừa bỏ vào